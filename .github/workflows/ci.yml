name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check API
        run: npx tsc --noEmit --project apps/api/tsconfig.json

      - name: Type check Web
        run: npx tsc --noEmit --project apps/web/tsconfig.json

      - name: Type check Runner
        run: npx tsc --noEmit --project apps/runner/tsconfig.json

      - name: Lint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build all packages
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [api, web, runner]
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} image
        run: |
          docker build \
            -f infrastructure/docker/Dockerfile.${{ matrix.service }} \
            -t qarevel-${{ matrix.service }}:${{ github.sha }} \
            .
